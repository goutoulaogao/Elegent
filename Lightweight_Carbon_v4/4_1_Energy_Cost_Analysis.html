<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能源消费统计分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f4f6f8;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .page-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* 顶部双图表布局 */
        .top-charts {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-box {
            flex: 1;
            height: 380px;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 查询栏 */
        .query-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #fff;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .query-bar label {
            font-size: 14px;
            color: #333;
        }
        .query-bar select,
        .query-bar button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        .query-bar button {
            background: #4e73f5;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* 表格 */
        .table-box {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .table-box th,
        .table-box td {
            padding: 12px 14px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table-box th {
            background-color: #4e73f5;
            color: #fff;
            font-weight: normal;
        }
        .table-box tr:hover {
            background: #f9fafb;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="page-title">能源消费统计分析</div>

        <!-- 顶部：环形图 + 趋势图 -->
        <div class="top-charts">
            <!-- 能源消耗占比环形图 -->
            <div id="pieChart" class="chart-box"></div>
            <!-- 能源消费趋势折线图 -->
            <div id="trendChart" class="chart-box"></div>
        </div>

        <!-- 查询条件：只控制表格 -->
        <div class="query-bar">
            <label>年份：</label>
            <select id="yearSelect">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>

            <label>月份：</label>
            <select id="monthSelect">
                <option value="">全部</option>
                <option value="1">1月</option>
                <option value="2">2月</option>
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="5">5月</option>
                <option value="6">6月</option>
                <option value="7">7月</option>
                <option value="8">8月</option>
                <option value="9">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
            </select>

            <button id="searchBtn">表格查询</button>
        </div>

        <!-- 底部数据表格 -->
        <table class="table-box">
            <thead>
                <tr>
                    <th>年份</th>
                    <th>月份</th>
                    <th>总能耗（万元）</th>
                    <th>水（万元）</th>
                    <th>电（万元）</th>
                    <th>气（万元）</th>
                    <th>热（万元）</th>
                    <th>油（万元）</th>
                    <th>煤（万元）</th>
                    <th>冷（万元）</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <script>
        // 初始化图表
        const pieChart = echarts.init(document.getElementById('pieChart'));
        const trendChart = echarts.init(document.getElementById('trendChart'));
        const dataTable = document.getElementById('dataTable');
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const searchBtn = document.getElementById('searchBtn');

        // 模拟数据（展示12个月）
        const monthList = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        const sourceData = [
            { year: 2025, month: 1, total: 1095, water: 120, electricity: 620, gas: 80, heat: 90, oil: 40, coal: 70, cold: 75 },
            { year: 2025, month: 2, total: 1220, water: 130, electricity: 680, gas: 90, heat: 100, oil: 45, coal: 105, cold: 70 },
            { year: 2025, month: 3, total: 1400, water: 180, electricity: 730, gas: 85, heat: 110, oil: 50, coal: 165, cold: 80 },
            { year: 2025, month: 4, total: 1365, water: 160, electricity: 710, gas: 95, heat: 105, oil: 48, coal: 162, cold: 85 },
            { year: 2025, month: 5, total: 1515, water: 170, electricity: 760, gas: 100, heat: 120, oil: 55, coal: 205, cold: 105 },
            { year: 2025, month: 6, total: 1480, water: 165, electricity: 720, gas: 105, heat: 115, oil: 52, coal: 203, cold: 120 },
            { year: 2025, month: 7, total: 1510, water: 170, electricity: 735, gas: 110, heat: 118, oil: 53, coal: 210, cold: 130 },
            { year: 2025, month: 8, total: 1555, water: 175, electricity: 760, gas: 108, heat: 122, oil: 56, coal: 215, cold: 130 },
            { year: 2025, month: 9, total: 1495, water: 172, electricity: 748, gas: 112, heat: 120, oil: 55, coal: 212, cold: 100 },
            { year: 2025, month: 10, total: 1535, water: 180, electricity: 780, gas: 115, heat: 125, oil: 58, coal: 220, cold: 85 },
            { year: 2025, month: 11, total: 1565, water: 185, electricity: 790, gas: 118, heat: 128, oil: 60, coal: 225, cold: 85 },
            { year: 2025, month: 12, total: 1585, water: 190, electricity: 800, gas: 120, heat: 130, oil: 62, coal: 230, cold: 85 }
        ];

        // ====================== 固定：环形图（本年度能源占比）======================
        function renderPieChart() {
            const data = sourceData.filter(i => i.year == 2025);
            const water = data.reduce((s, i) => s + i.water, 0);
            const electricity = data.reduce((s, i) => s + i.electricity, 0);
            const gas = data.reduce((s, i) => s + i.gas, 0);
            const heat = data.reduce((s, i) => s + i.heat, 0);
            const oil = data.reduce((s, i) => s + i.oil, 0);
            const coal = data.reduce((s, i) => s + i.coal, 0);
            const cold = data.reduce((s, i) => s + i.cold, 0);
            const total = water + electricity + gas + heat + oil + coal + cold;

            const option = {
                title: { text: '能源消费结构占比', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}：{c}万元<br/>占比：{d}%'
                },
                legend: { orient: 'vertical', bottom: 0, left: 10 },
                series: [{
                    name: '能源消费',
                    type: 'pie',
                    radius: ['40%', '70%'],
                    center: ['50%', '50%'],
                    data: [
                        { name: '电', value: electricity },
                        { name: '水', value: water },
                        { name: '煤', value: coal },
                        { name: '气', value: gas },
                        { name: '热', value: heat },
                        { name: '油', value: oil },
                        { name: '冷', value: cold }
                    ],
                    label: {
                        formatter: '{b}\n{d}%'
                    },
                    itemStyle: {
                        color: function(params) {
                            const colorList = ['#7c4aff', '#96ceb4', '#ff6b6b', '#ffab91', '#22ce98', '#ffc107', '#00bcd4'];
                            return colorList[params.dataIndex];
                        }
                    }
                }]
            };
            pieChart.setOption(option);
        }

        // ====================== 固定：折线图（本年度全年）======================
        function renderTrendChart() {
            const data = sourceData.filter(i => i.year == 2025);
            const option = {
                title: { text: '能源消费趋势', left: 'center', textStyle: { fontSize: 16 } },
                tooltip: { trigger: 'axis' },
                legend: { top: 30, data: ['水', '电', '气', '热', '油', '煤', '冷'] },
                grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                xAxis: { type: 'category', data: monthList },
                yAxis: { type: 'value', name: '万元' },
                series: [
                    { name: '水', type: 'line', data: data.map(i => i.water), itemStyle: { color: '#96ceb4' } },
                    { name: '电', type: 'line', data: data.map(i => i.electricity), itemStyle: { color: '#7c4aff' } },
                    { name: '气', type: 'line', data: data.map(i => i.gas), itemStyle: { color: '#ffab91' } },
                    { name: '热', type: 'line', data: data.map(i => i.heat), itemStyle: { color: '#22ce98' } },
                    { name: '油', type: 'line', data: data.map(i => i.oil), itemStyle: { color: '#ffc107' } },
                    { name: '煤', type: 'line', data: data.map(i => i.coal), itemStyle: { color: '#ff6b6b' } },
                    { name: '冷', type: 'line', data: data.map(i => i.cold), itemStyle: { color: '#00bcd4' } }
                ]
            };
            trendChart.setOption(option);
        }

        // ====================== 仅表格：查询刷新 ======================
        function renderTable(data) {
            dataTable.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.year}</td>
                    <td>${item.month}</td>
                    <td>${item.total.toFixed(2)}</td>
                    <td>${item.water.toFixed(2)}</td>
                    <td>${item.electricity.toFixed(2)}</td>
                    <td>${item.gas.toFixed(2)}</td>
                    <td>${item.heat.toFixed(2)}</td>
                    <td>${item.oil.toFixed(2)}</td>
                    <td>${item.coal.toFixed(2)}</td>
                    <td>${item.cold.toFixed(2)}</td>
                `;
                dataTable.appendChild(tr);
            });
        }

        // 表格查询
        function doTableSearch() {
            const y = yearSelect.value;
            const m = monthSelect.value;
            let filtered = sourceData.filter(i => i.year == y);
            if (m) filtered = filtered.filter(i => i.month == m);
            renderTable(filtered);
        }

        // 绑定事件
        searchBtn.addEventListener('click', doTableSearch);
        window.addEventListener('resize', () => {
            pieChart.resize();
            trendChart.resize();
        });

        // 初始化
        renderPieChart();
        renderTrendChart();
        doTableSearch();
    </script>
</body>
</html>
