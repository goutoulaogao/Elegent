<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻量碳结构综合展示</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f0f3f8;
            color: #333;
        }
        .layout {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: #1f2d3d;
            color: #fff;
            padding: 24px 18px;
            border-right: 1px solid #2c3d51;
        }
        .sidebar h1 {
            font-size: 20px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        .sidebar .menu {
            list-style: none;
        }
        .sidebar .menu li {
            margin-bottom: 10px;
        }
        .sidebar .menu button {
            width: 100%;
            text-align: left;
            padding: 12px 14px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #d7e3f0;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-size: 14px;
        }
        .sidebar .menu button:hover,
        .sidebar .menu button.active {
            background: #2f4b6f;
            color: #fff;
        }
        .sidebar .menu button .fa {
            width: 20px;
            text-align: center;
            margin-right: 8px;
            color: #7aa7d9;
        }
        .sidebar .menu li {
            position: relative;
        }
        .sidebar .menu .group-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .sidebar .menu .submenu {
            list-style: none;
            margin-top: 6px;
            margin-bottom: 14px;
            padding-left: 16px;
            display: none;
        }
        .sidebar .menu .submenu.expanded {
            display: block;
        }
        .sidebar .menu .submenu button {
            padding-left: 32px;
            font-size: 13px;
        }
        .sidebar .menu .toggle-icon {
            font-size: 12px;
            color: #91b3d6;
        }
        .sidebar .menu .group-btn.active + .submenu > li > button {
            color: #fff;
        }
        .sidebar .menu .group-btn.active {
            color: #fff;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .content-header {
            background: #fff;
            padding: 20px 24px;
            border-bottom: 1px solid #e6ecf2;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.04);
        }
        .content-header .title {
            font-size: 18px;
            font-weight: 600;
        }
        .content-header .hint {
            color: #666;
            font-size: 14px;
        }
        .iframe-wrapper {
            flex: 1;
            min-height: 0;
            background: #fff;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        @media (max-width: 960px) {
            .layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #2c3d51;
            }
            .content-header {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h1>轻量碳页面导航</h1>
            <ul class="menu">
                        <li><button type="button" data-src="1_1_home1.html" class="active"><i class="fa fa-search"></i>首页</button></li>
                
                        <li><button type="button" data-src="2_1_Energy_Check.html" class="active"><i class="fa fa-search"></i>能耗查询</button></li>
                        
                
                <li>
                    <button type="button" class="group-btn" data-toggle="energy-consumption"><span><i class="fa fa-tachometer"></i>能源消费量与强度计算</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="energy-consumption">
                        <li><button type="button" data-src="3_1_Energy_Consumption.html"><i class="fa fa-bolt"></i>能源消耗量</button></li>
                        <li><button type="button" data-src="3_2_Energy_Intensity.html"><i class="fa fa-tachometer"></i>能耗强度</button></li>
                    </ul>
                </li>
                <li>
                    <button type="button" class="group-btn" data-toggle="energy-analysis"><span><i class="fa fa-bar-chart"></i>能源消费分析与用能策略推荐</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="energy-analysis">
                        <li><button type="button" data-src="4_1_Energy_Cost_Analysis.html"><i class="fa fa-money"></i>能源成本分析</button></li>
                        <li><button type="button" data-src="4_2_Energy_Strategy_Recommend.html"><i class="fa fa-lightbulb-o"></i>用能策略推荐</button></li>
                    </ul>
                </li>
                 </li>
         <li><button type="button" data-src="5_Energy_efficiency_benchmarking.html"><span class="menu-icon"></span>能效对标</button></li>
         <li><button type="button" data-src="6_Flow_Analysis.html"><span class="menu-icon"></span>能流分析</button></li>
         <li><button type="button" data-src="7_Energy_balance_optimization.html"><span class="menu-icon"></span>能效平衡及优化</button></li>
        <li>
                <li>
                    <button type="button" class="group-btn" data-toggle="carbon-budget"><span><i class="fa fa-globe"></i>用能与碳排放预算管理</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="carbon-budget">
                        <li><button type="button" data-src="8_1_Energy_Carbon_Analysis.html"><i class="fa fa-calculator"></i>能源与碳排分析</button></li>
                        <li><button type="button" data-src="8_2_Energy_carbon_emission_prediction.html"><i class="fa fa-line-chart"></i>碳排放预测</button></li>
                    </ul>
                </li>
                <li>
                    <button type="button" class="group-btn" data-toggle="carbon-accounting"><span><i class="fa fa-folder-open"></i>碳排放核算</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="carbon-accounting">
                        <li><button type="button" data-src="9_1_Carbon_Accounting_Tool.html"><i class="fa fa-wrench"></i>碳排放核算工具</button></li>
                        <li><button type="button" data-src="9_2_Carbon_Accounting_Record.html"><i class="fa fa-file-text-o"></i>碳排放核算记录</button></li>
                    </ul>
                </li>
                <li>
                    <button type="button" class="group-btn" data-toggle="product-footprint"><span><i class="fa fa-leaf"></i>产品碳足迹核算</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="product-footprint">
                        <li><button type="button" data-src="10_1_Product_carbon_footprint.html"><i class="fa fa-leaf"></i>产品碳足迹管理</button></li>
                        <li><button type="button" data-src="10_2_Carbon_Factor_Database.html"><i class="fa fa-leaf"></i>产品碳因子库</button></li>
                    </ul>
                </li>
                <li>
                    <button type="button" class="group-btn" data-toggle="supply-chain"><span><i class="fa fa-truck"></i>供应链碳管理</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="supply-chain">
                        <li><button type="button" data-src="11_1_Supplier_ Management.html"><i class="fa fa-users"></i>供应商管理</button></li>
                        <li><button type="button" data-src="11_2_Supply_Chain_Carbon.html"><i class="fa fa-truck"></i>供应链碳管理</button></li>
                    </ul>
                </li>
                <li><button type="button" data-src="12_Carbon_Verification_Support.html"><i class="fa fa-check-circle"></i>碳核查数据支撑表</button></li>
                <li><button type="button" data-src="13_Carbon_Asset_Management.html"><i class="fa fa-pie-chart"></i>碳资产管理</button></li>
                <li><button type="button" data-src="14_AI_Smart_Suggestions.html"><i class="fa fa-pencil-square-o"></i>AI智能建议</button></li>
                <li><button type="button" data-src="15_Interface_Management.html"><i class="fa fa-pencil-square-o"></i>接口管理</button></li>
                <li><button type="button" data-src="2_2_Manual.html"><i class="fa fa-pencil-square-o"></i>手工填报</button></li>
                 <li>
                    <button type="button" class="group-btn" data-toggle="smart-device"><span><i class="fa fa-leaf"></i>智能设备采集</span><i class="fa fa-chevron-down toggle-icon"></i></button>
                    <ul class="submenu" id="smart-device">
                        <li><button type="button" data-src="16_1_Device_List.html"><i class="fa fa-leaf"></i>设备列表</button></li>
                        <li><button type="button" data-src="16_2_Product_TestPoint_Management.html"><i class="fa fa-leaf"></i>产品与测点管理</button></li>
                        <li><button type="button" data-src="16_3_Energy_Data_Dictionary.html"><i class="fa fa-leaf"></i>能源数据字典</button></li>
                    </ul>
                </li>
            </ul>
           
        </aside>
        <section class="content">
            <div class="content-header">
                <div class="title">页面预览</div>
                <div class="hint">左侧选择页面，右侧显示内容</div>
            </div>
            <div class="iframe-wrapper">
                <iframe id="previewFrame" src="2_1_Energy_Check.html" title="轻量碳页面展示"></iframe>
            </div>
        </section>
    </div>
    <script>
        const iframe = document.getElementById('previewFrame');
        const groupButtons = document.querySelectorAll('.sidebar .group-btn');
        const pageButtons = document.querySelectorAll('.sidebar .menu button[data-src]');

        groupButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.toggle);
                const isExpanded = target.classList.toggle('expanded');
                btn.querySelector('.toggle-icon').classList.toggle('fa-chevron-down', !isExpanded);
                btn.querySelector('.toggle-icon').classList.toggle('fa-chevron-up', isExpanded);
            });
        });

        pageButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                pageButtons.forEach(item => item.classList.remove('active'));
                btn.classList.add('active');
                iframe.src = btn.dataset.src;
                const parentGroup = btn.closest('.submenu');
                if (parentGroup) {
                    const groupBtn = document.querySelector(`.group-btn[data-toggle="${parentGroup.id}"]`);
                    if (groupBtn) {
                        document.querySelectorAll('.group-btn').forEach(item => item.classList.remove('active'));
                        groupBtn.classList.add('active');
                    }
                }
            });
        });
    </script>
</body>
</html>
