<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能耗与碳排分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f4f6f8;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* 标题 + 按钮 紧凑同行 */
        .header {
            display: flex;
            align-items: center;
            gap: 16px; /* 标题和按钮之间的距离 */
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 22px;
            color: #333;
            font-weight: bold;
        }

        /* 一体化按钮组 */
        .btn-group {
            display: flex;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .btn-group button {
            border: none;
            outline: none;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            background: #f5f7fa;
            color: #666;
            transition: all 0.2s;
        }
        .btn-group button:not(:last-child) {
            border-right: 1px solid #ddd;
        }
        .btn-group button.active {
            background: #009688;
            color: #fff;
        }

        /* 顶部双图表布局 */
        .top-charts {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }
        .chart-box {
            flex: 1;
            height: 380px;
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 查询栏 */
        .query-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #fff;
            padding: 14px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }
        .query-bar label {
            font-size: 14px;
            color: #333;
        }
        .query-bar select,
        .query-bar button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
        }
        .query-bar button {
            background: #4e73f5;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* 表格 */
        .table-box {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .table-box th,
        .table-box td {
            padding: 12px 14px;
            text-align: center;
            font-size: 14px;
            border-bottom: 1px solid #eee;
        }
        .table-box th {
            background-color: #009688;
            color: #fff;
            font-weight: normal;
        }
        .table-box tr:hover {
            background: #f9fafb;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 标题 + 按钮 紧凑同行 -->
        <div class="header">
            <div class="page-title">能耗与碳排分析</div>
            <div class="btn-group">
                <button id="btnEnergy" class="active">能耗分析</button>
                <button id="btnCarbon">碳排放分析</button>
            </div>
        </div>

        <!-- 顶部：环形图 + 趋势图 -->
        <div class="top-charts">
            <div id="pieChart" class="chart-box"></div>
            <div id="trendChart" class="chart-box"></div>
        </div>

        <!-- 查询条件：只控制表格 -->
        <div class="query-bar">
            <label>年份：</label>
            <select id="yearSelect">
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>

            <label>月份：</label>
            <select id="monthSelect">
                <option value="">全部</option>
                <option value="1">1月</option>
                <option value="2">2月</option>
                <option value="3">3月</option>
                <option value="4">4月</option>
                <option value="5">5月</option>
                <option value="6">6月</option>
            </select>

            <button id="searchBtn">表格查询</button>
        </div>

        <!-- 底部数据表格 -->
        <table class="table-box">
            <thead id="tableHead">
                <tr>
                    <th>年份</th>
                    <th>月份</th>
                    <th>总能耗(tce)</th>
                    <th>水(t)</th>
                    <th>电(kWh)</th>
                    <th>气(m³)</th>
                    <th>热(J)</th>
                    <th>油(t)</th>
                    <th>煤(t)</th>
                    <th>冷(J)</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <script>
        const pieChart = echarts.init(document.getElementById('pieChart'));
        const trendChart = echarts.init(document.getElementById('trendChart'));
        const dataTable = document.getElementById('dataTable');
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');
        const searchBtn = document.getElementById('searchBtn');
        const btnEnergy = document.getElementById('btnEnergy');
        const btnCarbon = document.getElementById('btnCarbon');
        const tableHead = document.getElementById('tableHead');

        // 切换模式：false=能耗, true=碳排放
        let isCarbonMode = false;

        const monthList = ['1月', '2月', '3月', '4月', '5月', '6月'];
        
        // 能耗数据
        const energyData = [
            { year: 2025, month: 1, total: 1020, water: 120, electricity: 620, gas: 80, heat: 90, oil: 40, coal: 70, cool: 60 },
            { year: 2025, month: 2, total: 1150, water: 130, electricity: 680, gas: 90, heat: 100, oil: 45, coal: 105, cool: 65 },
            { year: 2025, month: 3, total: 1320, water: 180, electricity: 730, gas: 85, heat: 110, oil: 50, coal: 165, cool: 72 },
            { year: 2025, month: 4, total: 1280, water: 160, electricity: 710, gas: 95, heat: 105, oil: 48, coal: 162, cool: 68 },
            { year: 2025, month: 5, total: 1410, water: 170, electricity: 760, gas: 100, heat: 120, oil: 55, coal: 205, cool: 78 },
            { year: 2025, month: 6, total: 1360, water: 165, electricity: 720, gas: 105, heat: 115, oil: 52, coal: 203, cool: 74 }
        ];

        // 碳排放数据（按系数计算）
        const carbonData = energyData.map(item => ({
            year: item.year,
            month: item.month,
            total: (item.total * 0.25).toFixed(2),
            water: (item.water * 0.1).toFixed(2),
            electricity: (item.electricity * 0.28).toFixed(2),
            gas: (item.gas * 0.216).toFixed(2),
            heat: (item.heat * 0.15).toFixed(2),
            oil: (item.oil * 0.32).toFixed(2),
            coal: (item.coal * 0.27).toFixed(2),
            cool: (item.cool * 0.12).toFixed(2)
        }));

        // 按钮切换逻辑
        btnEnergy.addEventListener('click', () => {
            isCarbonMode = false;
            btnEnergy.classList.add('active');
            btnCarbon.classList.remove('active');
            updateAll();
        });
        btnCarbon.addEventListener('click', () => {
            isCarbonMode = true;
            btnCarbon.classList.add('active');
            btnEnergy.classList.remove('active');
            updateAll();
        });

        // 更新全部图表和表格
        function updateAll() {
            renderPie();
            renderTrend();
            doTableSearch();
            updateTableHeader();
        }

        // 更新表格表头
        function updateTableHeader() {
            if (isCarbonMode) {
                tableHead.innerHTML = `
                <tr>
                    <th>年份</th>
                    <th>月份</th>
                    <th>总排放(tCO₂e)</th>
                    <th>水(tCO₂e)</th>
                    <th>电(tCO₂e)</th>
                    <th>气(tCO₂e)</th>
                    <th>热(tCO₂e)</th>
                    <th>油(tCO₂e)</th>
                    <th>煤(tCO₂e)</th>
                    <th>冷(tCO₂e)</th>
                </tr>`;
            } else {
                tableHead.innerHTML = `
                <tr>
                    <th>年份</th>
                    <th>月份</th>
                    <th>总能耗(tce)</th>
                    <th>水(t)</th>
                    <th>电(kWh)</th>
                    <th>气(m³)</th>
                    <th>热(J)</th>
                    <th>油(t)</th>
                    <th>煤(t)</th>
                    <th>冷(J)</th>
                </tr>`;
            }
        }

        // 环形图
        function renderPie() {
            const data = isCarbonMode ? carbonData : energyData;
            const yearData = data.filter(i => i.year == 2025);
            
            const water = +yearData.reduce((s, i) => s + parseFloat(i.water), 0);
            const electricity = +yearData.reduce((s, i) => s + parseFloat(i.electricity), 0);
            const gas = +yearData.reduce((s, i) => s + parseFloat(i.gas), 0);
            const heat = +yearData.reduce((s, i) => s + parseFloat(i.heat), 0);
            const oil = +yearData.reduce((s, i) => s + parseFloat(i.oil), 0);
            const coal = +yearData.reduce((s, i) => s + parseFloat(i.coal), 0);
            const cool = +yearData.reduce((s, i) => s + parseFloat(i.cool), 0);

            const option = {
                title: { text: isCarbonMode ? '碳排放结构占比' : '能源消耗结构占比', left: 'center' },
                tooltip: {
                    trigger: 'item',
                    formatter: `{b}：{c} ${isCarbonMode ? 'tCO₂e' : 'tce'}<br/>占比：{d}%`
                },
                legend: { orient: 'vertical', bottom: 0, left: 10 },
                series: [{
                    type: 'pie', radius: ['40%', '70%'],
                    data: [
                        { name: '电', value: electricity },
                        { name: '水', value: water },
                        { name: '煤', value: coal },
                        { name: '气', value: gas },
                        { name: '热', value: heat },
                        { name: '油', value: oil },
                        { name: '冷', value: cool }
                    ],
                    label: { formatter: '{b}\n{d}%' }
                }]
            };
            pieChart.setOption(option);
        }

        // 趋势图
        function renderTrend() {
            const data = isCarbonMode ? carbonData : energyData;
            const yearData = data.filter(i => i.year == 2025);

            const option = {
                title: { text: isCarbonMode ? '碳排放趋势' : '能源消耗趋势', left: 'center' },
                tooltip: { trigger: 'axis' },
                legend: { top: 30, data: ['水', '电', '气', '热', '油', '煤', '冷'] },
                xAxis: { data: monthList },
                yAxis: { name: isCarbonMode ? 'tCO₂e' : 'tce' },
                series: [
                    { name: '水', type: 'line', data: yearData.map(i => i.water) },
                    { name: '电', type: 'line', data: yearData.map(i => i.electricity) },
                    { name: '气', type: 'line', data: yearData.map(i => i.gas) },
                    { name: '热', type: 'line', data: yearData.map(i => i.heat) },
                    { name: '油', type: 'line', data: yearData.map(i => i.oil) },
                    { name: '煤', type: 'line', data: yearData.map(i => i.coal) },
                    { name: '冷', type: 'line', data: yearData.map(i => i.cool) }
                ]
            };
            trendChart.setOption(option);
        }

        // 表格
        function renderTable(data) {
            dataTable.innerHTML = '';
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.year}</td>
                    <td>${item.month}</td>
                    <td>${item.total}</td>
                    <td>${item.water}</td>
                    <td>${item.electricity}</td>
                    <td>${item.gas}</td>
                    <td>${item.heat}</td>
                    <td>${item.oil}</td>
                    <td>${item.coal}</td>
                    <td>${item.cool}</td>`;
                dataTable.appendChild(tr);
            });
        }

        // 查询
        function doTableSearch() {
            const y = yearSelect.value;
            const m = monthSelect.value;
            let source = isCarbonMode ? carbonData : energyData;
            let filtered = source.filter(i => i.year == y);
            if (m) filtered = filtered.filter(i => i.month == m);
            renderTable(filtered);
        }

        searchBtn.addEventListener('click', doTableSearch);
        window.addEventListener('resize', () => { pieChart.resize(); trendChart.resize(); });

        // 初始化
        updateAll();
    </script>
</body>
</html>
