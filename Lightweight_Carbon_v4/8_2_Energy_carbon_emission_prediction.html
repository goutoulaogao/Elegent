<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能源与碳排放监测分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .container {
            width: 98%;
            margin: 20px auto;
        }
        /* 标题 + 按钮组同行布局 */
        .title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .title-row h2 {
            font-size: 19px;
            color: #333;
            font-weight: 600;
        }
        /* 按钮组整体样式 */
        .btn-group {
            display: flex;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }
        .btn-group button {
            border: none;
            outline: none;
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            background: #f5f7fa;
            color: #666;
            transition: all 0.2s;
        }
        .btn-group button:not(:last-child) {
            border-right: 1px solid #ddd;
        }
        /* 选中状态 */
        .btn-group button.active {
            background: #009688;
            color: #fff;
        }

        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 15px;
            background: #f5f7fa;
            border-radius: 8px;
            border: 1px solid #e6e6e6;
        }
        .toolbar label {
            font-size: 15px;
            color: #333;
        }
        .toolbar select {
            padding: 6px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            font-size: 14px;
        }
        .chart-box {
            width: 100%;
            height: 480px;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            background: #fff;
            margin-bottom: 30px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .table-box {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .table-box th,
        .table-box td {
            border: 1px solid #eee;
            padding: 11px 8px;
            text-align: center;
            font-size: 14px;
        }
        .table-box th {
            background-color: #009688;
            color: #fff;
            font-weight: normal;
        }
        .table-box tr:nth-child(even) {
            background-color: #fafbfc;
        }
        .table-box tr:hover {
            background-color: #f1faff;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 + 按钮组 -->
        <div class="title-row">
            <h2>能源消耗与碳排放分析</h2>
            <div class="btn-group">
                <button id="btnEnergy" class="active">能耗分析</button>
                <button id="btnCarbon">碳排放分析</button>
            </div>
        </div>

        <div class="toolbar">
            <label>选择能源：</label>
            <select id="energyType">
                <option value="electric">电</option>
                <option value="water">水</option>
                <option value="gas">气</option>
                <option value="heat">热</option>
            </select>
        </div>

        <div id="mainChart" class="chart-box"></div>

        <h2>详细数据表格</h2>
        <table class="table-box">
            <thead>
                <tr>
                    <th>能源类型</th>
                    <th>单位</th>
                    <th>合计</th>
                    <th>一月</th>
                    <th>二月</th>
                    <th>三月</th>
                    <th>四月</th>
                    <th>五月</th>
                    <th>六月</th>
                    <th>七月</th>
                    <th>八月</th>
                    <th>九月</th>
                    <th>十月</th>
                    <th>十一月</th>
                    <th>十二月</th>
                </tr>
            </thead>
            <tbody id="dataTable"></tbody>
        </table>
    </div>

    <script>
        const chart = echarts.init(document.getElementById('mainChart'));
        const energySelect = document.getElementById('energyType');
        const btnEnergy = document.getElementById('btnEnergy');
        const btnCarbon = document.getElementById('btnCarbon');
        const tableBody = document.getElementById('dataTable');

        let showCarbon = false;
        const currentMonth = 5;

        const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

        const data = {
            electric: {
                name: '电', unit: 'kWh', carbonUnit: 'tCO₂',
                usePredict: [120,132,141,152,162,174,185,170,155,166,177,189],
                useReal: [110,128,137,148,158,166,179,165,150,160,171,182],
                carbonPredict: [80,88,94,102,109,117,124,114,105,111,118,126],
                carbonReal: [73,85,91,99,105,112,120,110,101,107,114,121]
            },
            water: {
                name: '水', unit: 'm³', carbonUnit: 'tCO₂',
                usePredict: [60,72,75,80,85,90,95,92,88,94,98,102],
                useReal: [55,68,71,76,81,86,91,88,84,90,94,98],
                carbonPredict: [1.8,2.2,2.3,2.4,2.6,2.7,2.9,2.8,2.6,2.8,3.0,3.1],
                carbonReal: [1.7,2.1,2.2,2.3,2.5,2.6,2.8,2.7,2.5,2.7,2.9,3.0]
            },
            gas: {
                name: '气', unit: 'm³', carbonUnit: 'tCO₂',
                usePredict: [30,35,40,45,50,55,60,57,52,58,62,66],
                useReal: [28,33,38,42,47,52,57,54,49,55,59,63],
                carbonPredict: [57,67,76,86,95,105,114,109,99,109,118,126],
                carbonReal: [53,63,72,81,90,99,108,103,93,103,111,119]
            },
            heat: {
                name: '热', unit: 'GJ', carbonUnit: 'tCO₂',
                usePredict: [45,50,55,60,65,70,75,72,68,74,78,82],
                useReal: [42,47,52,57,62,67,72,69,65,70,74,78],
                carbonPredict: [12,14,15,17,18,20,21,20,19,20,22,23],
                carbonReal: [11,13,14,16,17,19,20,19,18,19,21,22]
            }
        };

        function sum(arr) {
            return arr.reduce((a,b)=>a+b,0).toFixed(1);
        }

        function getMixedSeries(realData, predictData, color) {
            let data = [];
            for (let i=0; i<12; i++) {
                if (i <= currentMonth) {
                    data.push(realData[i]);
                } else {
                    data.push(predictData[i]);
                }
            }
            return [
                {
                    name: '实际值',
                    type: 'line',
                    data: data.map((v,i) => i <= currentMonth ? v : null),
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { width: 3, color: color, type: 'solid' },
                    itemStyle: { color: color }
                },
                {
                    name: '预测值',
                    type: 'line',
                    data: data.map((v,i) => i >= currentMonth ? v : null),
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { width: 3, color: color, type: 'dashed' },
                    itemStyle: { color: color }
                }
            ];
        }

        function updateAll() {
            const key = energySelect.value;
            const item = data[key];
            
            const opt = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0,0,0,0.6)',
                    textStyle: { color: '#fff' }
                },
                legend: { top: 5, textStyle: { fontSize: 14 } },
                grid: { left: '5%', right: '5%', top: '15%', bottom: '8%' },
                xAxis: {
                    type: 'category',
                    data: months,
                    axisLine: { lineStyle: { color: '#ccc' } }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#ccc' } }
                },
                series: []
            };

            if (!showCarbon) {
                opt.title = { text: `${item.name} 能源用量趋势`, textStyle: { fontSize: 16, fontWeight: 'bold' } };
                opt.legend.data = ['实际用量','预测用量'];
                opt.series = getMixedSeries(item.useReal, item.usePredict, '#5470c6');
            } else {
                opt.title = { text: `${item.name} 碳排放趋势`, textStyle: { fontSize: 16, fontWeight: 'bold' } };
                opt.legend.data = ['实际排放','预测排放'];
                opt.series = getMixedSeries(item.carbonReal, item.carbonPredict, '#fb7293');
            }

            chart.setOption(opt, true);
            updateTable();
        }

        function updateTable() {
            const key = energySelect.value;
            const item = data[key];
            tableBody.innerHTML = '';

            const realArr = showCarbon ? item.carbonReal : item.useReal;
            let row = `<tr><td>${item.name}</td><td>${showCarbon ? item.carbonUnit : item.unit}</td><td><strong>${sum(realArr)}</strong></td>`;
            realArr.forEach(v => { row += `<td>${v}</td>`; });
            row += '</tr>';
            tableBody.innerHTML = row;
        }

        // 按钮切换逻辑
        btnEnergy.addEventListener('click', () => {
            showCarbon = false;
            btnEnergy.classList.add('active');
            btnCarbon.classList.remove('active');
            updateAll();
        });
        btnCarbon.addEventListener('click', () => {
            showCarbon = true;
            btnCarbon.classList.add('active');
            btnEnergy.classList.remove('active');
            updateAll();
        });

        energySelect.addEventListener('change', updateAll);
        window.addEventListener('resize', () => chart.resize());

        updateAll();
    </script>
</body>
</html>
