<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>碳排放管理监测平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            success: '#00B42A',
            warning: '#FF7D00',
            danger: '#F53F3F',
            light: '#F2F3F5'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .card-shadow { box-shadow: 0 4px 6px rgba(0,0,0,0.08); border-radius: 0.5rem; background: #ffffff; border: 1px solid #f3f4f6; }
      .table-th { background: #f9fafb; text-align: center; padding: 0.75rem 0.5rem; font-weight: 500; font-size: 0.875rem; border: 1px solid #e5e7eb; }
      .table-td { text-align: center; padding: 0.625rem 0.5rem; border: 1px solid #e5e7eb; font-size: 0.875rem; }
      .form-input { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; font-size: 0.875rem; }
    }
  </style>
</head>
<body class="bg-[#F5F7FA] min-h-screen p-4 md:p-6">
  <div class="max-w-7xl mx-auto">
    <!-- 标题 -->
    <div class="mb-5">
      <h1 class="text-[clamp(1.25rem,3vw,1.75rem)] font-bold text-gray-800 flex items-center">
        <i class="fa fa-bar-chart text-primary mr-2"></i>能耗强度管理
      </h1>
      <p class="text-gray-500 mt-1">能源消耗、产值数据一体化展示</p>
    </div>

    <!-- 顶部数据卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <div class="card-shadow p-5 border-l-4 border-primary">
        <div class="text-sm text-gray-500 mb-1">年度总能源使用量（tce）</div>
        <div class="text-3xl font-bold text-primary" id="totalEnergy">2,864.52</div>
        <div class="text-xs text-gray-400 mt-2">吨标准煤</div>
      </div>
      
      <div class="card-shadow p-5 border-l-4 border-success relative">
        <div class="text-sm text-gray-500 mb-1">年度总产值（万元）</div>
        <div class="text-3xl font-bold text-success" id="totalOutput">18,642.36</div>
        <div class="text-xs text-gray-400 mt-2">万元人民币</div>
        <button id="openOutputModal" class="absolute top-4 right-4 bg-success text-white px-3 py-1 rounded text-sm hover:bg-success/90">
          <i class="fa fa-pencil mr-1"></i>填报
        </button>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="card-shadow p-5 mb-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="font-semibold text-gray-800">月度能耗强度趋势</h2>
      </div>
      <div id="chart" class="w-full h-[350px]"></div>
    </div>

    <!-- 能源消耗表格 -->
    <div class="card-shadow p-5">
      <div class="flex flex-wrap gap-3 items-center justify-start mb-4">
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-600">年份：</label>
          <select id="filterYear" class="form-input min-w-[96px]">
            <option value="">全部</option>
            <option value="2025">2025</option>
            <option value="2024">2024</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-600">月份：</label>
          <select id="filterMonth" class="form-input min-w-[96px]">
            <option value="">全部</option>
            <option value="1">1月</option>
            <option value="2">2月</option>
            <option value="3">3月</option>
            <option value="4">4月</option>
            <option value="5">5月</option>
            <option value="6">6月</option>
            <option value="7">7月</option>
            <option value="8">8月</option>
            <option value="9">9月</option>
            <option value="10">10月</option>
            <option value="11">11月</option>
            <option value="12">12月</option>
          </select>
        </div>
        <button id="searchTableBtn" class="bg-primary text-white px-3 py-1.5 rounded text-sm hover:bg-primary/90">
          <i class="fa fa-search mr-1"></i>查询
        </button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full border-collapse border border-gray-200">
          <thead>
            <tr>
              <th class="table-th">年份</th>
              <th class="table-th">月份</th>
              <th class="table-th">能源消耗量(tce)</th>
              <th class="table-th">总产值(万元)</th>
              <th class="table-th">水(tce)</th>
              <th class="table-th">电(tce)</th>
              <th class="table-th">气(tce)</th>
              <th class="table-th">热(tce)</th>
              <th class="table-th">煤(tce)</th>
              <th class="table-th">油(tce)</th>
              <th class="table-th">冷(tce)</th>
              <th class="table-th">单位产值能耗(tce/万元)</th>
            </tr>
          </thead>
          <tbody id="dataBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 月度产值填报弹窗 -->
  <div id="outputModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-6 w-full max-w-3xl max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-800">月度产值填报（万元）</h3>
        <button id="closeModal" class="text-gray-500 hover:text-gray-800 text-xl">&times;</button>
      </div>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-6">
        <div>
          <label class="block text-sm text-gray-600 mb-1">1月产值</label>
          <input type="number" id="month1" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">2月产值</label>
          <input type="number" id="month2" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">3月产值</label>
          <input type="number" id="month3" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">4月产值</label>
          <input type="number" id="month4" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">5月产值</label>
          <input type="number" id="month5" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">6月产值</label>
          <input type="number" id="month6" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">7月产值</label>
          <input type="number" id="month7" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">8月产值</label>
          <input type="number" id="month8" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">9月产值</label>
          <input type="number" id="month9" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">10月产值</label>
          <input type="number" id="month10" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">11月产值</label>
          <input type="number" id="month11" class="form-input" placeholder="请输入产值">
        </div>
        <div>
          <label class="block text-sm text-gray-600 mb-1">12月产值</label>
          <input type="number" id="month12" class="form-input" placeholder="请输入产值">
        </div>
      </div>

      <div class="flex justify-between items-center pt-4 border-t">
        <div class="text-sm text-gray-600">
          合计产值：<span id="sumOutput" class="font-bold text-success">0.00</span> 万元
        </div>
        <div class="flex gap-3">
          <button id="cancelBtn" class="px-4 py-2 bg-gray-200 rounded text-sm hover:bg-gray-300">取消</button>
          <button id="saveBtn" class="px-4 py-2 bg-success text-white rounded text-sm hover:bg-success/90">保存提交</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 初始化图表
    const chartDom = document.getElementById('chart');
    const myChart = echarts.init(chartDom);

    // 月度数据
    const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const data = [5.32,5.41,5.25,5.18,5.11,5.05,4.98,5.02,4.93,4.86,4.79,4.72]; // tco2e/tce

    // 图表配置
    function renderChart() {
      const option = {
        title: { text: '每万元能源消耗强度', left: 'center', textStyle: { fontSize: 14, color: '#666' } },
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: months },
        yAxis: { type: 'value', name: 'tce/万元' },
        series: [{
          data: data,
          type: 'bar',
          itemStyle: { color: '#165DFF' },
          barWidth: '40%'
        }]
      };
      myChart.setOption(option);
    }

    // 首次渲染
    renderChart();
    window.addEventListener('resize', () => myChart.resize());

    // 表格查询数据
    const dataBody = document.getElementById('dataBody');
    const filterYear = document.getElementById('filterYear');
    const filterMonth = document.getElementById('filterMonth');
    const searchTableBtn = document.getElementById('searchTableBtn');

    const tableData = [
      { year: 2025, month: 1, energy: 225.36, output: 1480.25, water: 12.35, electricity: 98.62, gas: 45.36, heat: 32.11, coal: 18.52, oil: 12.36, cool: 6.04, intensity: 0.1523 },
      { year: 2025, month: 2, energy: 218.42, output: 1426.33, water: 11.82, electricity: 95.16, gas: 42.15, heat: 30.24, coal: 17.33, oil: 11.85, cool: 5.87, intensity: 0.1531 },
      { year: 2025, month: 3, energy: 235.71, output: 1562.88, water: 13.15, electricity: 105.26, gas: 48.32, heat: 33.45, coal: 19.86, oil: 13.12, cool: 6.55, intensity: 0.1509 },
      { year: 2025, month: 4, energy: 242.18, output: 1610.55, water: 13.88, electricity: 108.33, gas: 49.66, heat: 34.21, coal: 20.15, oil: 13.88, cool: 6.97, intensity: 0.1504 },
      { year: 2025, month: 5, energy: 248.33, output: 1658.22, water: 14.26, electricity: 111.47, gas: 51.33, heat: 35.88, coal: 21.45, oil: 14.26, cool: 7.18, intensity: 0.1498 }
    ];

    function renderTable(data) {
      dataBody.innerHTML = '';
      if (!data.length) {
        dataBody.innerHTML = '<tr><td class="table-td" colspan="12">暂无数据</td></tr>';
        return;
      }
      data.forEach(item => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="table-td">${item.year}</td>
          <td class="table-td">${item.month}</td>
          <td class="table-td">${item.energy.toFixed(2)}</td>
          <td class="table-td">${item.output.toFixed(2)}</td>
          <td class="table-td">${item.water.toFixed(2)}</td>
          <td class="table-td">${item.electricity.toFixed(2)}</td>
          <td class="table-td">${item.gas.toFixed(2)}</td>
          <td class="table-td">${item.heat.toFixed(2)}</td>
          <td class="table-td">${item.coal.toFixed(2)}</td>
          <td class="table-td">${item.oil.toFixed(2)}</td>
          <td class="table-td">${item.cool.toFixed(2)}</td>
          <td class="table-td">${item.intensity.toFixed(4)}</td>
        `;
        dataBody.appendChild(tr);
      });
    }

    function filterTable() {
      const year = filterYear.value;
      const month = filterMonth.value;
      let filtered = tableData;
      if (year) filtered = filtered.filter(item => item.year.toString() === year);
      if (month) filtered = filtered.filter(item => item.month.toString() === month);
      renderTable(filtered);
    }

    searchTableBtn.addEventListener('click', filterTable);
    renderTable(tableData);

    // 弹窗操作
    const modal = document.getElementById('outputModal');
    const openModalBtn = document.getElementById('openOutputModal');
    const closeModalBtn = document.getElementById('closeModal');
    const cancelBtn = document.getElementById('cancelBtn');
    const saveBtn = document.getElementById('saveBtn');
    const totalOutputEl = document.getElementById('totalOutput');
    const sumOutputEl = document.getElementById('sumOutput');

    // 打开弹窗
    openModalBtn.addEventListener('click', () => {
      modal.classList.remove('hidden');
      calculateSum();
    });

    // 关闭弹窗
    function closeModal() {
      modal.classList.add('hidden');
    }
    closeModalBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);

    // 实时计算合计
    function calculateSum() {
      let sum = 0;
      for(let i=1; i<=12; i++) {
        const val = parseFloat(document.getElementById(`month${i}`).value) || 0;
        sum += val;
      }
      sumOutputEl.textContent = sum.toFixed(2);
      return sum;
    }

    // 监听输入变化
    for(let i=1; i<=12; i++) {
      document.getElementById(`month${i}`).addEventListener('input', calculateSum);
    }

    // 保存数据
    saveBtn.addEventListener('click', () => {
      const total = calculateSum();
      totalOutputEl.textContent = total.toLocaleString(undefined, {minimumFractionDigits: 2});
      closeModal();
      alert('月度产值填报成功！年度总产值已自动更新。');
    });
  </script>
</body>
</html>
