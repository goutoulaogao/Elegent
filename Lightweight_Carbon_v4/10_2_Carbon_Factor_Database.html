<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品碳因子库</title>
<style>
:root {
  --bg: #080e1a;
  --panel: #0c1528;
  --card: #111c33;
  --border: #1a2a45;
  --accent: #00d4ff;
  --accent3: #7c5ce7;
  --text: #e0e6f0;
  --text-dim: #8899bb;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
  min-height: 100vh;
}

.container {
  max-width: 1920px;
  margin: 0 auto;
  padding: 20px 24px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 20px; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(90deg, var(--accent), #fff, var(--accent));
  background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.header-right {
  font-size: 13px; color: var(--text-dim);
}

/* Tab Buttons */
.tab-bar {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
  background: var(--card);
  border-radius: 10px;
  padding: 4px;
  border: 1px solid var(--border);
}

.tab-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.25s;
  letter-spacing: 1px;
}

.tab-btn:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}

.tab-btn.active {
  background: var(--accent);
  color: #080e1a;
  font-weight: 600;
  box-shadow: 0 0 16px rgba(0,212,255,0.25);
}

/* Table Container */
.table-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.table-wrapper {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
}

thead th {
  background: var(--card);
  color: var(--accent);
  font-size: 13px;
  font-weight: 600;
  padding: 14px 16px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  letter-spacing: 0.5px;
}

tbody td {
  padding: 13px 16px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  max-width: 320px;
  overflow: hidden;
  text-overflow: ellipsis;
}

tbody tr:hover td {
  background: rgba(0,212,255,0.03);
  color: var(--text);
}

tbody tr:last-child td {
  border-bottom: none;
}

/* Numeric values */
td.num {
  color: var(--accent3);
  font-weight: 600;
  font-family: "SF Mono", "Consolas", monospace;
  white-space: nowrap;
}

td.num.negative {
  color: #4caf50;
}

/* Empty cell */
td.empty {
  color: #3a4560;
}

/* Page indicator */
.page-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  background: var(--card);
}

.page-info .count {
  color: var(--accent);
}

/* Column widths */
th.col-l1, td.col-l1 { min-width: 140px; }
th.col-l2, td.col-l2 { min-width: 160px; }
th.col-l3, td.col-l3 { min-width: 180px; }
th.col-up, td.col-up { min-width: 100px; text-align: right; }
th.col-up-unit, td.col-up-unit { min-width: 140px; }
th.col-down, td.col-down { min-width: 100px; text-align: right; }
th.col-down-unit, td.col-down-unit { min-width: 140px; }
th.col-proc, td.col-proc { min-width: 200px; }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>产品碳因子库</h1>
    <!-- <div class="header-right">数据来源：产品碳因子库.xlsx</div> -->
  </div>

  <!-- Tab Buttons -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="0">工业产品</button>
    <button class="tab-btn" data-tab="1">能源产品</button>
    <button class="tab-btn" data-tab="2">生活产品</button>
    <button class="tab-btn" data-tab="3">废弃物处理</button>
    <button class="tab-btn" data-tab="4">交通服务</button>
    <button class="tab-btn" data-tab="5">碳汇</button>
  </div>

  <!-- Table -->
  <div class="table-panel">
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th class="col-l1">1级分类</th>
            <th class="col-l2">2级分类</th>
            <th class="col-l3">3级分类</th>
            <th class="col-up">上游排放</th>
            <th class="col-up-unit">上游排放单位</th>
            <th class="col-down">下游排放</th>
            <th class="col-down-unit">下游排放单位</th>
            <th class="col-proc">排放环节</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="page-info">
      <span>展示 <span class="count" id="rowCount">5</span> 条记录（共 5 条）</span>
      <span id="tabLabel">工业产品</span>
    </div>
  </div>

</div>

const TAB_LABELS = ['工业产品', '能源产品', '生活产品', '废弃物处理', '交通服务', '碳汇'];

// ============================================================
// Render table
// ============================================================
const tbody = document.getElementById('tableBody');
const rowCount = document.getElementById('rowCount');
const tabLabel = document.getElementById('tabLabel');

function formatCell(value) {
  if (value === '' || value === null || value === undefined) {
    return '<span class="empty">—</span>';
  }
  return value;
}

function renderTable(tabIndex) {
  const rows = DATA[tabIndex];
  let html = '';
  rows.forEach(row => {
    html += '<tr>';
    // col 0: 1级分类
    html += '<td class="col-l1">' + formatCell(row[0]) + '</td>';
    // col 1: 2级分类
    html += '<td class="col-l2">' + formatCell(row[1]) + '</td>';
    // col 2: 3级分类
    html += '<td class="col-l3">' + formatCell(row[2]) + '</td>';
    // col 3: 上游排放 (numeric or empty)
    if (row[3] === '' || row[3] === null || row[3] === undefined) {
      html += '<td class="col-up empty">—</td>';
    } else {
      const cls = row[3] < 0 ? 'num negative' : 'num';
      html += '<td class="col-up ' + cls + '">' + Number(row[3]).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 6}) + '</td>';
    }
    // col 4: 上游排放单位
    html += '<td class="col-up-unit">' + formatCell(row[4]) + '</td>';
    // col 5: 下游排放 (numeric or empty)
    if (row[5] === '' || row[5] === null || row[5] === undefined) {
      html += '<td class="col-down empty">—</td>';
    } else {
      const cls = row[5] < 0 ? 'num negative' : 'num';
      html += '<td class="col-down ' + cls + '">' + Number(row[5]).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 6}) + '</td>';
    }
    // col 6: 下游排放单位
    html += '<td class="col-down-unit">' + formatCell(row[6]) + '</td>';
    // col 7: 排放环节
    html += '<td class="col-proc">' + formatCell(row[7]) + '</td>';
    html += '</tr>';
  });
  tbody.innerHTML = html;
  rowCount.textContent = rows.length;
  tabLabel.textContent = TAB_LABELS[tabIndex];
}

// ============================================================
// Tab switching
// ============================================================
const tabButtons = document.querySelectorAll('.tab-btn');

tabButtons.forEach(btn => {
  btn.addEventListener('click', function() {
    tabButtons.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const tabIndex = parseInt(this.getAttribute('data-tab'));
    renderTable(tabIndex);
  });
});

// Initial render
renderTable(0);
</script>

</body>
</html>
