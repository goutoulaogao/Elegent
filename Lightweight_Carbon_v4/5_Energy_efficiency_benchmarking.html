<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能效对标</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f7fa; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-box { background: white; padding: 24px; border-radius: 8px; width: 600px; }
        .btn-submit { background: #4080ff; color: white; padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background: #f5f7fa; font-weight: 600; }
        .chart-wrap { position: relative; }
        .chart-top-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
        }
        .section-box {
            border: 2px solid #d0d5dd;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            background: #fff;
        }
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #1d2939;
            margin-bottom: 20px;
            padding-left: 12px;
            border-left: 4px solid #4080ff;
        }
    </style>
</head>
<body class="p-6">

<!-- 顶部：年度选择 -->
<div class="flex flex-wrap items-center gap-4 mb-5">
    <div class="flex items-center gap-2">
        <label class="font-medium">年度：</label>
        <select id="yearSelect" class="border rounded px-3 py-2 outline-none border-gray-300">
            <option value="2024">2024年</option>
            <option value="2025" selected>2025年</option>
            <option value="2026">2026年</option>
        </select>
    </div>
</div>

<!-- 单位产值能耗 -->
<div class="section-box">
    <div class="section-title">单位产值能耗</div>
    <div class="chart-wrap mb-5">
        <button class="btn-submit chart-top-btn" data-modal-type="output">填报阈值</button>
        <canvas id="chartOutput" height="260"></canvas>
    </div>
    <table>
        <thead>
            <tr>
                <th>类型</th>
                <th>单位</th>
                <th>合计</th>
                <th>一月</th><th>二月</th><th>三月</th><th>四月</th><th>五月</th><th>六月</th>
                <th>七月</th><th>八月</th><th>九月</th><th>十月</th><th>十一月</th><th>十二月</th>
            </tr>
        </thead>
        <tbody id="tableOutput"></tbody>
    </table>
</div>

<!-- 单位产品能耗 -->
<div class="section-box">
    <div class="section-title">单位产品能耗</div>
    <div class="chart-wrap mb-5">
        <button class="btn-submit chart-top-btn" data-modal-type="product">填报阈值</button>
        <canvas id="chartProduct" height="260"></canvas>
    </div>
    <table>
        <thead>
            <tr>
                <th>类型</th>
                <th>单位</th>
                <th>合计</th>
                <th>一月</th><th>二月</th><th>三月</th><th>四月</th><th>五月</th><th>六月</th>
                <th>七月</th><th>八月</th><th>九月</th><th>十月</th><th>十一月</th><th>十二月</th>
            </tr>
        </thead>
        <tbody id="tableProduct"></tbody>
    </table>
</div>

<!-- 阈值填报弹窗 -->
<div class="modal-backdrop" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle" class="text-lg font-medium mb-4">设置12个月的单位产值能耗</h3>
        <div class="grid grid-cols-3 gap-3 mb-4" id="thresholdInputs"></div>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 border rounded">取消</button>
            <button onclick="saveThreshold()" class="btn-submit">保存</button>
        </div>
    </div>
</div>

<script>
const monthLabels = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
let currentModalType = 'output';

const data = {
    output: {
        name: '单位产值能耗',
        unit: 'tce/万元',
        actual: [0.52,0.58,0.63,0.55,0.60,0.66,0.70,0.68,0.62,0.65,0.59,0.57],
        threshold: [0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60]
    },
    product: {
        name: '单位产品能耗',
        unit: 'tce/每产品',
        actual: [0.41,0.45,0.49,0.43,0.47,0.51,0.54,0.52,0.48,0.50,0.46,0.44],
        threshold: [0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50]
    }
};

let charts = {};

init();
function init() {
    initChart('output', 'chartOutput');
    initChart('product', 'chartProduct');
    renderTable('output', 'tableOutput');
    renderTable('product', 'tableProduct');
    bindModal();
}

function initChart(type, canvasId) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    charts[type] = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: monthLabels,
            datasets: [
                {
                    label: '实际值',
                    data: data[type].actual,
                    backgroundColor: '#4080ff',
                    order: 2,
                    barPercentage: 0.4,
                    categoryPercentage: 0.5
                },
                {
                    label: '阈值',
                    data: data[type].threshold,
                    borderColor: '#ff4d4f',
                    borderWidth: 2,
                    borderDash: [5,5],
                    pointRadius: 0,
                    type: 'line',
                    fill: false,
                    order: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: data[type].unit }
                }
            }
        }
    });
}

function renderTable(type, tableId) {
    const d = data[type];
    const total = d.actual.reduce((a,b)=>a+b,0).toFixed(3);
    const row = `<tr>
        <td>${d.name}</td>
        <td>${d.unit}</td>
        <td>${total}</td>
        ${d.actual.map(v => `<td>${v}</td>`).join('')}
    </tr>`;
    document.getElementById(tableId).innerHTML = row;
}

function updateChart(type) {
    const c = charts[type];
    c.data.datasets[0].data = data[type].actual;
    c.data.datasets[1].data = data[type].threshold;
    c.update();
}

function renderModalInputs() {
    const html = monthLabels.map((m,i) => `
        <div>
            <label class="block text-sm mb-1">${m}</label>
            <input type="number" step="0.01" class="w-full border rounded px-2 py-1 threshold-input" data-index="${i}" value="${data[currentModalType].threshold[i]}">
        </div>
    `).join('');
    document.getElementById('thresholdInputs').innerHTML = html;
}

function bindModal() {
    document.querySelectorAll('.chart-top-btn').forEach(btn => {
        btn.onclick = () => {
            currentModalType = btn.dataset.modalType;
            renderModalInputs();
            document.getElementById('modalTitle').textContent = currentModalType === 'output' ? '设置12个月的单位产值能耗' : '设置12个月的单位产品能耗';
            document.getElementById('modal').style.display = 'flex';
        };
    });
}

function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

function saveThreshold() {
    const vals = document.querySelectorAll('.threshold-input');
    vals.forEach(input => {
        const i = input.dataset.index;
        const val = parseFloat(input.value) || 0;
        data[currentModalType].threshold[i] = val;
    });
    updateChart(currentModalType);
    closeModal();
}
</script>
</body>
</html>
