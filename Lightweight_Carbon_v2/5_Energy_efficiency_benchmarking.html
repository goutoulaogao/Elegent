<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能效对标</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.0/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background: #f5f7fa; }
        .modal-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; align-items: center; justify-content: center; z-index: 999; }
        .modal-box { background: white; padding: 24px; border-radius: 8px; width: 600px; }
        .tag-btn { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: #fff; }
        .tag-btn.active { background: #e6f0ff; border-color: #4080ff; color: #4080ff; }
        .btn-submit { background: #4080ff; color: white; padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; text-align: center; border: 1px solid #eee; }
        th { background: #f5f7fa; font-weight: 600; }
        /* 图表容器相对定位，用于按钮绝对定位 */
        .chart-wrap {
            position: relative;
        }
        /* 图表右上角按钮样式 */
        .chart-top-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            z-index: 10;
        }
    </style>
</head>
<body class="p-6">

<!-- 顶部：年度选择 + 类型切换 -->
<div class="flex flex-wrap items-center gap-4 mb-5">
    <div class="flex items-center gap-4">
        <!-- 年度下拉 -->
        <div class="flex items-center gap-2">
            <label class="font-medium">年度：</label>
            <select id="yearSelect" class="border rounded px-3 py-2 outline-none border-gray-300">
                <option value="2024">2024年</option>
                <option value="2025" selected>2025年</option>
                <option value="2026">2026年</option>
            </select>
        </div>

        <!-- 类型切换 -->
        <div class="flex items-center gap-3">
            <button class="tag-btn active" data-type="output">单位产值能耗</button>
            <button class="tag-btn" data-type="product">单位产品能耗</button>
        </div>
    </div>
</div>

<!-- 图表区域 - 增加相对定位容器，按钮移入右上角 -->
<div class="bg-white p-5 rounded-lg shadow-sm mb-6 chart-wrap">
    <!-- 阈值按钮 -->
    <button class="btn-submit chart-top-btn" id="openModal">填报阈值</button>
    <canvas id="barChart" height="260"></canvas>
</div>

<!-- 数据表格 -->
<div class="bg-white p-5 rounded-lg shadow-sm">
    <table>
        <thead>
            <tr>
                <th>类型</th>
                <th>单位</th>
                <th>合计</th>
                <th>一月</th><th>二月</th><th>三月</th><th>四月</th><th>五月</th><th>六月</th>
                <th>七月</th><th>八月</th><th>九月</th><th>十月</th><th>十一月</th><th>十二月</th>
            </tr>
        </thead>
        <tbody id="dataTable">
        </tbody>
    </table>
</div>

<!-- 阈值填报弹窗 -->
<div class="modal-backdrop" id="modal">
    <div class="modal-box">
        <h3 id="modalTitle" class="text-lg font-medium mb-4">设置12个月的单位产值能耗</h3>
        <div class="grid grid-cols-3 gap-3 mb-4" id="thresholdInputs">
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 border rounded">取消</button>
            <button onclick="saveThreshold()" class="btn-submit">保存</button>
        </div>
    </div>
</div>

<script>
// 全局数据
const monthLabels = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
let currentType = 'output';

// 实际值数据
const data = {
    output: {
        name: '单位产值能耗',
        unit: 'tce/万元',
        actual: [0.52,0.58,0.63,0.55,0.60,0.66,0.70,0.68,0.62,0.65,0.59,0.57],
        threshold: [0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60,0.60]
    },
    product: {
        name: '单位产品能耗',
        unit: 'tce/每产品',
        actual: [0.41,0.45,0.49,0.43,0.47,0.51,0.54,0.52,0.48,0.50,0.46,0.44],
        threshold: [0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50,0.50]
    }
};

let chart;

// 初始化
init();
function init() {
    renderModalInputs();
    initChart();
    renderTable();
    bindSwitch();
    bindModal();
}

// 初始化图表（柱状图变窄）
function initChart() {
    const ctx = document.getElementById('barChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: monthLabels,
            datasets: [
                {
                    label: '实际值',
                    data: data[currentType].actual,
                    backgroundColor: '#4080ff',
                    order: 2,
                    barPercentage: 0.4, // 柱子变窄
                    categoryPercentage: 0.5
                },
                {
                    label: '阈值',
                    data: data[currentType].threshold,
                    borderColor: '#ff4d4f',
                    borderWidth: 2,
                    borderDash: [5,5],
                    pointRadius: 0,
                    type: 'line',
                    fill: false,
                    order: 1
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { position: 'top' } },
            scales: {
                y: {
                    beginAtZero: true,
                    title: {
                        display: true,
                        text: data[currentType].unit
                    }
                }
            }
        }
    });
}

// 渲染表格
function renderTable() {
    const d = data[currentType];
    const total = d.actual.reduce((a,b)=>a+b,0).toFixed(3);
    const row = `<tr>
        <td>${d.name}</td>
        <td>${d.unit}</td>
        <td>${total}</td>
        ${d.actual.map(v => `<td>${v}</td>`).join('')}
    </tr>`;
    document.getElementById('dataTable').innerHTML = row;
}

// 类型切换
function bindSwitch() {
    document.querySelectorAll('.tag-btn').forEach(el => {
        el.onclick = () => {
            document.querySelectorAll('.tag-btn').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            currentType = el.dataset.type;
            updateChart();
            renderTable();
        }
    });
}

// 更新图表
function updateChart() {
    chart.data.datasets[0].data = data[currentType].actual;
    chart.data.datasets[1].data = data[currentType].threshold;
    chart.options.scales.y.title.text = data[currentType].unit;
    chart.update();
}

// 弹窗渲染
function renderModalInputs() {
    const html = monthLabels.map((m,i) => `
        <div>
            <label class="block text-sm mb-1">${m}</label>
            <input type="number" step="0.01" class="w-full border rounded px-2 py-1 threshold-input" data-index="${i}" value="${data[currentType].threshold[i]}">
        </div>
    `).join('');
    document.getElementById('thresholdInputs').innerHTML = html;
}

// 弹窗绑定
function bindModal() {
    document.getElementById('openModal').onclick = () => {
        renderModalInputs();
        document.getElementById('modalTitle').textContent = currentType === 'output' ? '设置12个月的单位产值能耗' : '设置12个月的单位产品能耗';
        document.getElementById('modal').style.display = 'flex';
    }
}

// 关闭弹窗
function closeModal() {
    document.getElementById('modal').style.display = 'none';
}

// 保存阈值
function saveThreshold() {
    const vals = document.querySelectorAll('.threshold-input');
    vals.forEach(input => {
        const i = input.dataset.index;
        const val = parseFloat(input.value) || 0;
        data[currentType].threshold[i] = val;
    });
    updateChart();
    closeModal();
}
</script>
</body>
</html>
