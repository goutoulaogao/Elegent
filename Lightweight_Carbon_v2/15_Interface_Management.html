<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据上送管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; color: #333; padding: 24px; }

.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.header h1 { font-size: 22px; font-weight: 600; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all .2s; }
.btn-primary { background: #1677ff; color: #fff; }
.btn-primary:hover { background: #4096ff; }
.btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
.btn-default:hover { border-color: #1677ff; color: #1677ff; }
.btn-danger { background: #fff; color: #ff4d4f; border: 1px solid #ff4d4f; }
.btn-danger:hover { background: #ff4d4f; color: #fff; }

.search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-bar input, .search-bar select { padding: 7px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; transition: border-color .2s; }
.search-bar input:focus, .search-bar select:focus { border-color: #1677ff; }
.search-bar input { width: 240px; }
.record-count { color: #888; font-size: 13px; margin-left: auto; }

.table-wrapper { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: #fafafa; }
th { padding: 12px 14px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #f0f0f0; white-space: nowrap; }
td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
tbody tr:hover { background: #fafafa; }

.tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
.tag-green  { color: #52c41a; background: #f6ffed; border: 1px solid #b7eb8f; }
.tag-gray   { color: #999;    background: #f5f5f5; border: 1px solid #d9d9d9; }
.tag-red    { color: #ff4d4f; background: #fff2f0; border: 1px solid #ffccc7; }
.tag-yellow { color: #d48806; background: #fffbe6; border: 1px solid #ffe58f; }
.tag-blue   { color: #1677ff; background: #e6f4ff; border: 1px solid #91caff; }

.ip-badge { cursor: pointer; position: relative; color: #1677ff; font-weight: 500; }
.ip-tooltip { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 6px 10px; border-radius: 4px; font-size: 12px; white-space: nowrap; z-index: 10; margin-bottom: 6px; }
.ip-tooltip::after { content: ""; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #333; }
.ip-badge:hover .ip-tooltip { display: block; }

.col-name { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default; }
.col-url { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
.modal-mask.show { display: flex; }
.modal { background: #fff; border-radius: 8px; width: 640px; max-height: 85vh; overflow-y: auto; padding: 24px; box-shadow: 0 6px 24px rgba(0,0,0,.12); }
.modal h2 { margin-bottom: 20px; font-size: 18px; }
.form-row { display: flex; flex-direction: column; margin-bottom: 14px; }
.form-row label { font-size: 13px; color: #555; margin-bottom: 4px; font-weight: 500; }
.form-row input, .form-row select, .form-row textarea { padding: 7px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #1677ff; }
.form-row textarea { resize: vertical; min-height: 60px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

.empty-state { text-align: center; padding: 60px 20px; color: #999; }

@media (max-width: 1200px) { .table-wrapper { overflow-x: auto; } table { min-width: 1200px; } }
</style>
</head>
<body>

<div class="header">
  <h1>数据上送管理</h1>
  <button class="btn btn-primary" onclick="openAddModal()">+ 新增数据</button>
</div>

<div class="search-bar">
  <input type="text" id="searchName" placeholder="搜索接口名称..." oninput="renderTable()">
  <input type="text" id="searchUrl" placeholder="搜索接口地址..." oninput="renderTable()">
  <select id="searchStatus" onchange="renderTable()">
    <option value="">全部状态</option>
    <option value="启用">启用</option>
    <option value="停用">停用</option>
  </select>
  <select id="searchMode" onchange="renderTable()">
    <option value="">全部模式</option>
    <option value="对方拉取(GET)">对方拉取(GET)</option>
    <option value="我方主动推送(POST)">我方主动推送(POST)</option>
  </select>
  <span class="record-count" id="recordCount"></span>
</div>

<div class="table-wrapper">
  <table>
    <thead>
      <tr>
        <th>接口名称</th>
        <th>接口地址</th>
        <th>对接合作方/外部系统名称</th>
        <th>对接所属单位</th>
        <th>对接模式</th>
        <th>对接状态</th>
        <th>最近调用时间</th>
        <th>创建时间</th>
        <th style="width:80px">操作</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- 新增/编辑弹窗 -->
<div class="modal-mask" id="modalMask">
  <div class="modal">
    <h2 id="modalTitle">新增数据</h2>
    <input type="hidden" id="editIndex" value="-1">
    <div class="form-row">
      <label>接口名称 <span style="color:#ff4d4f">*</span></label>
      <input type="text" id="fName" placeholder="多个接口逗号分隔，例如：用户数据查询,业务台账推送">
    </div>
    <div class="form-row">
      <label>接口地址 (URL) <span style="color:#ff4d4f">*</span></label>
      <input type="text" id="fUrl" placeholder="https://api.example.com/v1/...">
    </div>
    <div class="form-row">
      <label>对接合作方/外部系统名称 <span style="color:#ff4d4f">*</span></label>
      <input type="text" id="fPartner" placeholder="对方调用系统全称">
    </div>
    <div class="form-row">
      <label>对接所属单位 <span style="color:#ff4d4f">*</span></label>
      <input type="text" id="fUnit" placeholder="对方企业/政企单位主体名称">
    </div>
    <div class="form-row">
      <label>对接模式 <span style="color:#ff4d4f">*</span></label>
      <select id="fMode">
        <option value="对方拉取(GET)">对方拉取(GET)</option>
        <option value="我方主动推送(POST)">我方主动推送(POST)</option>
      </select>
    </div>
    <div class="form-row">
      <label>对接状态 <span style="color:#ff4d4f">*</span></label>
      <select id="fStatus">
        <option value="启用">启用</option>
        <option value="停用">停用</option>
      </select>
    </div>
    <div class="form-row">
      <label>IP白名单 <span style="color:#888;font-weight:400">（每行一个IP，或逗号分隔）</span></label>
      <textarea id="fIps" placeholder="192.168.1.100&#10;10.0.0.50"></textarea>
    </div>
    <div class="form-row">
      <label>最近调用时间</label>
      <input type="datetime-local" id="fLastCall">
    </div>
    <div class="form-row">
      <label>创建时间 <span style="color:#ff4d4f">*</span></label>
      <input type="datetime-local" id="fCreated">
    </div>
    <div class="form-actions">
      <button class="btn btn-default" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveData()">保存</button>
    </div>
  </div>
</div>

<script>
// 预设示例数据
let dataList = [
  {
    name: "数据同步",
    url: "http://10.60.5.32:86/prod-api/carbon/group/overview/carbon",
    partner: "碳中和服务平台",
    unit: "xx市政府",
    mode: "对方拉取(GET)",
    status: "启用",
    
    lastCall: "2026-06-23 14:32:10",
    created: "2025-03-15 09:00:00"
  },
  {
    name: "数据同步",
    url: "http://10.60.5.32:86/prod-api/carbon/group/overview/carbon",
    partner: "工业碳效码平台",
    unit: "xx市工信厅",
    mode: "我方主动推送(POST)",
    status: "启用",
    
    lastCall: "2026-06-23 15:01:45",
    created: "2025-06-01 10:30:00"
  }
  
];

function statusTag(s) {
  const map = { "启用":"tag-green", "停用":"tag-gray" };
  return `<span class="tag ${map[s]||""}">${s}</span>`;
}

function modeTag(m) {
  const cls = m === "对方拉取(GET)" ? "tag-blue" : "tag-blue";
  return `<span class="tag ${cls}">${m}</span>`;
}

function formatTime(t) {
  if (!t || t === "-") return "-";
  return t.replace("T", " ");
}

function renderTable() {
  const sName = document.getElementById("searchName").value.toLowerCase();
  const sUrl  = document.getElementById("searchUrl").value.toLowerCase();
  const sStatus = document.getElementById("searchStatus").value;
  const sMode  = document.getElementById("searchMode").value;

  const filtered = dataList.filter(d => {
    if (sName   && !d.name.toLowerCase().includes(sName)) return false;
    if (sUrl    && !d.url.toLowerCase().includes(sUrl))   return false;
    if (sStatus && d.status !== sStatus)                   return false;
    if (sMode   && d.mode !== sMode)                       return false;
    return true;
  });

  const tbody = document.getElementById("tableBody");
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" class="empty-state">暂无匹配数据</td></tr>`;
  } else {
    tbody.innerHTML = filtered.map((d, i) => `<tr>
      <td class="col-name" title="${d.name}">${d.name}</td>
      <td class="col-url" title="${d.url}">${d.url}</td>
      <td>${d.partner}</td>
      <td>${d.unit}</td>
      <td>${modeTag(d.mode)}</td>
      <td>${statusTag(d.status)}</td>
      <td>${formatTime(d.lastCall)}</td>
      <td>${formatTime(d.created)}</td>
      <td>
        <button class="btn btn-default" style="padding:4px 10px;font-size:12px;margin-right:4px" onclick="openEditModal(${dataList.indexOf(d)})">编辑</button>
        <button class="btn btn-danger" style="padding:4px 10px;font-size:12px" onclick="deleteRow(${dataList.indexOf(d)})">删除</button>
      </td>
    </tr>`).join("");
  }

  document.getElementById("recordCount").textContent = `共 ${filtered.length} 条记录`;
}

function openAddModal() {
  document.getElementById("modalTitle").textContent = "新增数据";
  document.getElementById("editIndex").value = "-1";
  document.getElementById("fName").value = "";
  document.getElementById("fUrl").value = "";
  document.getElementById("fPartner").value = "";
  document.getElementById("fUnit").value = "";
  document.getElementById("fMode").value = "对方拉取(GET)";
  document.getElementById("fStatus").value = "启用";
  document.getElementById("fIps").value = "";
  document.getElementById("fLastCall").value = "";
  document.getElementById("fCreated").value = "";
  document.getElementById("modalMask").classList.add("show");
}

function openEditModal(idx) {
  const d = dataList[idx];
  document.getElementById("modalTitle").textContent = "编辑数据";
  document.getElementById("editIndex").value = idx;
  document.getElementById("fName").value = d.name;
  document.getElementById("fUrl").value = d.url;
  document.getElementById("fPartner").value = d.partner;
  document.getElementById("fUnit").value = d.unit;
  document.getElementById("fMode").value = d.mode;
  document.getElementById("fStatus").value = d.status;
  document.getElementById("fIps").value = d.ips.join("\n");
  document.getElementById("fLastCall").value = d.lastCall === "-" ? "" : d.lastCall.replace(" ", "T");
  document.getElementById("fCreated").value = d.created.replace(" ", "T");
  document.getElementById("modalMask").classList.add("show");
}

function closeModal() {
  document.getElementById("modalMask").classList.remove("show");
}

function parseIps(raw) {
  const lines = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  return [...new Set(lines)];
}

function saveData() {
  const name    = document.getElementById("fName").value.trim();
  const url     = document.getElementById("fUrl").value.trim();
  const partner = document.getElementById("fPartner").value.trim();
  const unit    = document.getElementById("fUnit").value.trim();
  if (!name || !url || !partner || !unit) { alert("请填写所有必填字段（接口名称、接口地址、合作方、所属单位）"); return; }

  const obj = {
    name,
    url,
    partner,
    unit,
    mode:   document.getElementById("fMode").value,
    status: document.getElementById("fStatus").value,
    ips:    parseIps(document.getElementById("fIps").value),
    calls:  0, // 保留字段但默认0，不展示
    lastCall: document.getElementById("fLastCall").value ? document.getElementById("fLastCall").value.replace("T", " ") : "-",
    created:  document.getElementById("fCreated").value.replace("T", " ")
  };

  const idx = parseInt(document.getElementById("editIndex").value);
  if (idx >= 0) {
    dataList[idx] = obj;
  } else {
    dataList.push(obj);
  }

  closeModal();
  renderTable();
}

function deleteRow(idx) {
  if (!confirm("确定要删除这条数据吗？")) return;
  dataList.splice(idx, 1);
  renderTable();
}

// 点击遮罩关闭
document.getElementById("modalMask").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// 初始渲染
renderTable();
</script>
</body>
</html>
